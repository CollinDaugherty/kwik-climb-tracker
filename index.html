<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kwik Climb 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #e8e8ed;
      --bg2: #ffffff;
      --bg3: #e8e8ed;
      --card: #ffffff;
      --card2: #e8e8ed;
      --label: #000000;
      --label2: #3c3c43;
      --label3: #3c3c4399;
      --label4: #3c3c432e;
      --sep: #d1d1d6;
      --accent: #34c759;
      --accent2: #30d158;
      --red: #ff3b30;
      --yellow: #ff9f0a;
      --blue: #007aff;
      --fill: #78788033;
      --fill2: #78788029;
      --fill3: #7878801f;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #000000;
        --bg2: #2c2c2e;
        --bg3: #000000;
        --card: #2c2c2e;
        --card2: #3a3a3c;
        --label: #ffffff;
        --label2: #ebebf5;
        --label3: #ebebf599;
        --label4: #ebebf52e;
        --sep: #48484a;
        --accent: #30d158;
        --accent2: #34c759;
        --red: #ff453a;
        --yellow: #ffd60a;
        --blue: #0a84ff;
        --fill: #78788052;
        --fill2: #78788042;
        --fill3: #7878803d;
        }
    }

    body {
      background: var(--bg);
      color: var(--label);
      font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input:focus { outline: none; }
    button { -webkit-tap-highlight-color: transparent; }

    .card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
    }

    .section-header {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--label3);
      padding: 0 4px;
      margin-bottom: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--sep);
      gap: 12px;
    }
    .row:last-child { border-bottom: none; }

    .pill-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 980px;
      font-size: 15px;
      font-weight: 600;
      padding: 8px 20px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      font-family: inherit;
    }
    .pill-btn:active { opacity: 0.7; }

    .seg-bar {
      display: flex;
      gap: 3px;
    }
    .seg-bar button {
      flex: 1;
      height: 10px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .seg-bar button:active { transform: scaleY(1.3); }

    .stat-val {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 11px;
      font-weight: 500;
      color: var(--label3);
      margin-top: 4px;
      letter-spacing: 0.01em;
    }

    .num-input {
      background: transparent;
      border: none;
      font-family: inherit;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--label);
      width: 100%;
      -webkit-appearance: none;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--fill2);
      border: none;
      color: var(--blue);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
    }
    .nav-btn:disabled { color: var(--label4); cursor: default; }
    .nav-btn:not(:disabled):active { background: var(--fill); }

    .status-banner {
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .prize-bar-track {
      flex: 1;
      height: 4px;
      background: var(--fill3);
      border-radius: 2px;
      overflow: hidden;
    }
    .prize-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    a { color: var(--blue); text-decoration: none; }
    a:active { opacity: 0.7; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SWEEPSTAKES_START = new Date("2026-06-01T00:00:00");
const TOTAL_DAYS = 77;
const amoeMode = new URLSearchParams(window.location.search).get('amoe') === 'true';

function getDayNumber() {
  const now = new Date();
  const diff = Math.floor((now - SWEEPSTAKES_START) / (1000 * 60 * 60 * 24));
  return Math.min(Math.max(diff + 1, 1), TOTAL_DAYS);
}

function formatDate(d) {
  return d.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
}

function formatDateShort(d) {
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

const defaultDay = () => ({
  free: 0, form: 0, points: 0, purchase: 0, ad: 0,
  entries: "", visits: "",
});

function DrawingBreakdown({ drawings, entriesForDrawing, todayNum }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ borderTop: "0.5px solid var(--sep)" }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          width: "100%", padding: "12px 16px", background: "transparent", border: "none",
          display: "flex", justifyContent: "space-between", alignItems: "center",
          cursor: "pointer", fontFamily: "inherit",
        }}
      >
        <span style={{ fontSize: 15, color: "var(--blue)", fontWeight: 500 }}>Entries per drawing</span>
        <span style={{ fontSize: 13, color: "var(--label3)", transition: "transform 0.2s", display: "inline-block", transform: open ? "rotate(180deg)" : "rotate(0deg)" }}>▾</span>
      </button>
      {open && (
        <div style={{ borderTop: "0.5px solid var(--sep)" }}>
          {drawings.map(d => {
            const entries = entriesForDrawing(d.day);
            const isPast = todayNum > d.day;
            return (
              <div key={d.day} style={{
                display: "flex", alignItems: "center", justifyContent: "space-between",
                padding: "10px 16px", borderBottom: "0.5px solid var(--sep)",
                opacity: isPast ? 0.45 : 1,
              }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 500, color: "var(--label)" }}>{d.label} · {d.date}</div>
                  <div style={{ fontSize: 12, color: "var(--label3)", marginTop: 2 }}>${d.prize.toLocaleString()} jackpot</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontSize: 17, fontWeight: 700, color: entries > 0 ? "var(--accent)" : "var(--label3)" }}>
                    {entries > 0 ? entries.toLocaleString() : "—"}
                  </div>
                  <div style={{ fontSize: 11, color: "var(--label3)", marginTop: 1 }}>entries</div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function App() {
  const [log, setLog] = useState({});
  const [activeDay, setActiveDay] = useState(getDayNumber());
  const [loaded, setLoaded] = useState(false);
  const [accountNumber, setAccountNumber] = useState("");
  const [copyLabel, setCopyLabel] = useState("Copy");
  const importRef = useRef();

  useEffect(() => {
    try {
      const logRes = localStorage.getItem("kwik-log");
      const acctRes = localStorage.getItem("kwik-account");
      if (logRes) setLog(JSON.parse(logRes));
      if (acctRes) setAccountNumber(acctRes);
    } catch (e) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem("kwik-log", JSON.stringify(log)); } catch (e) {}
  }, [log, loaded]);

  useEffect(() => {
    if (!loaded) return;
    try { localStorage.setItem("kwik-account", accountNumber); } catch (e) {}
  }, [accountNumber, loaded]);

  const todayNum = getDayNumber();
  const today = log[activeDay] || defaultDay();
  const isFuture = activeDay > todayNum;

  function updateDay(field, value) {
    if (isFuture) return;
    setLog(prev => ({
      ...prev,
      [activeDay]: { ...(prev[activeDay] || defaultDay()), [field]: value },
    }));
  }

  const totalEntries = Object.values(log).reduce((max, d) => Math.max(max, parseInt(d.entries) || 0), 0);

  // Visits as of the active day being viewed
  const activeDayVisitsCurrent = parseInt((log[activeDay] || {}).visits) || Object.keys(log)
    .map(Number)
    .filter(d => d <= activeDay && parseInt(log[d].visits) > 0)
    .sort((a, b) => b - a)
    .reduce((val, d) => val || (parseInt(log[d].visits) || 0), 0);
  const currentVisits = activeDayVisitsCurrent;

  const daysRemaining = TOTAL_DAYS - activeDay;
  const visitsNeeded = Math.max(0, daysRemaining * 5 - currentVisits - daysRemaining);
  const targetPerDay = daysRemaining > 0 ? Math.ceil(visitsNeeded / daysRemaining) : 0;
  const onTrack = currentVisits + daysRemaining >= daysRemaining * 5;
  const stillNeed = Math.max(0, daysRemaining * 4 - currentVisits);

  const dayDate = new Date(SWEEPSTAKES_START.getTime() + (activeDay - 1) * 86400000);

  // All drawings with correct prizes from official rules
  // Each drawing includes all entries from day 1 through that drawing's last day
  const drawings = [
    { day: 7,  date: "Jun 7",  label: "Week 1",  prize: 10000,  daily: 1000 },
    { day: 14, date: "Jun 14", label: "Week 2",  prize: 15000,  daily: 1000 },
    { day: 21, date: "Jun 21", label: "Week 3",  prize: 20000,  daily: 1000 },
    { day: 28, date: "Jun 28", label: "Week 4",  prize: 25000,  daily: 1000 },
    { day: 35, date: "Jul 5",  label: "Week 5",  prize: 30000,  daily: 1000 },
    { day: 42, date: "Jul 12", label: "Week 6",  prize: 35000,  daily: 1000 },
    { day: 49, date: "Jul 19", label: "Week 7",  prize: 40000,  daily: 1000 },
    { day: 56, date: "Jul 26", label: "Week 8",  prize: 45000,  daily: 1000 },
    { day: 63, date: "Aug 2",  label: "Week 9",  prize: 50000,  daily: 1000 },
    { day: 70, date: "Aug 9",  label: "Week 10", prize: 100000, daily: 1000 },
    { day: 77, date: "Aug 16", label: "Week 11", prize: 250000, daily: 1000 },
  ];
  const nextDrawing = drawings.find(d => d.day >= todayNum);
  const daysToDrawing = nextDrawing ? nextDrawing.day - todayNum : 0;

  // Entries towards each drawing = entries logged on or before that drawing's last day
  // Since entries is a running total, find the latest logged entry on or before that day
  function entriesForDrawing(drawingDay) {
    const relevantDays = Object.keys(log)
      .map(Number)
      .filter(d => d <= drawingDay && parseInt(log[d].entries) > 0)
      .sort((a, b) => b - a);
    return relevantDays.length > 0 ? (parseInt(log[relevantDays[0]].entries) || 0) : 0;
  }

  function copyAccount() {
    navigator.clipboard.writeText(accountNumber).then(() => {
      setCopyLabel("Copied!");
      setTimeout(() => setCopyLabel("Copy"), 2000);
    });
  }

  function exportData() {
    const blob = new Blob([JSON.stringify({ log, accountNumber }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "kwik-climb-backup.json"; a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.log) setLog(data.log);
        if (data.accountNumber) setAccountNumber(data.accountNumber);
      } catch { alert("Invalid backup file."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  }

  const allTicketSources = [
    { key: "free", label: "Free Daily", max: 1, color: "var(--accent)" },
    { key: "form", label: "AMOE", max: 5, color: "var(--blue)", amoeOnly: true },
    { key: "points", label: "Visit Redemption", max: 5, color: "var(--accent)" },
    { key: "purchase", label: "Purchase", max: 5, color: "var(--yellow)" },
    { key: "ad", label: "Watch Ad", max: 1, color: "var(--blue)" },
  ];
  const ticketSources = allTicketSources.filter(s => !s.amoeOnly || amoeMode);

  if (!loaded) return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: "var(--label3)", fontSize: 15 }}>
      Loading…
    </div>
  );

  return (
    <div style={{ maxWidth: 430, margin: "0 auto", padding: "0 0 32px" }}>

      {/* Header */}
      <div style={{ padding: "56px 20px 20px" }}>
        <div style={{ fontSize: 13, fontWeight: 600, color: "var(--label3)", letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 6 }}>Kwik Rewards</div>
        <div style={{ fontSize: 34, fontWeight: 700, letterSpacing: -1, color: "var(--label)", lineHeight: 1.1 }}>Kwik Climb 2026</div>
        <div style={{ fontSize: 15, color: "var(--label3)", marginTop: 6, fontWeight: 400 }}>Jun 1 – Aug 16</div>
      </div>

      {/* Stats + Countdown combined card */}
      <div style={{ padding: "0 16px", marginBottom: 32 }}>
        <div className="card">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr" }}>
            {[
              { label: "Entries", value: totalEntries.toLocaleString(), color: "var(--accent)" },
              { label: "Visit Pts", value: activeDayVisitsCurrent, color: onTrack ? "var(--accent)" : "var(--red)" },
              { label: "Days Left", value: daysRemaining, color: "var(--label)" },
            ].map((s, i) => (
              <div key={s.label} style={{ padding: "16px 12px", textAlign: "center", borderRight: i < 2 ? "0.5px solid var(--sep)" : "none" }}>
                <div className="stat-val" style={{ color: s.color }}>{s.value}</div>
                <div className="stat-lbl">{s.label}</div>
              </div>
            ))}
          </div>
          {nextDrawing && (
            <div style={{ borderTop: "0.5px solid var(--sep)", padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontSize: 13, color: "var(--label3)", fontWeight: 500, marginBottom: 3 }}>{nextDrawing.label} · {nextDrawing.date}</div>
                <div style={{ fontSize: 19, fontWeight: 700, color: "var(--accent)", letterSpacing: -0.5 }}>${nextDrawing.prize.toLocaleString()} jackpot</div>
                <div style={{ fontSize: 12, color: "var(--label3)", marginTop: 2 }}>+ daily $1,000 prizes Mon–Sat</div>
              </div>
              <div style={{ textAlign: "center", background: "var(--card2)", borderRadius: 12, padding: "10px 16px", minWidth: 70 }}>
                <div style={{ fontSize: 28, fontWeight: 700, color: "var(--label)", letterSpacing: -1, lineHeight: 1 }}>{daysToDrawing}</div>
                <div style={{ fontSize: 11, color: "var(--label3)", fontWeight: 500, marginTop: 3 }}>{daysToDrawing === 1 ? "day" : "days"}</div>
              </div>
            </div>
          )}
          {nextDrawing && <DrawingBreakdown drawings={drawings} entriesForDrawing={entriesForDrawing} todayNum={todayNum} />}
        </div>
      </div>



      {/* Day nav */}
      <div style={{ padding: "0 20px", marginBottom: 12 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button className="nav-btn" onClick={() => setActiveDay(d => Math.max(1, d - 1))} disabled={activeDay === 1}>‹</button>
          <div style={{ textAlign: "center", flex: 1, margin: "0 12px" }}>
            <div style={{ fontSize: 17, fontWeight: 600, color: "var(--label)" }}>{formatDate(dayDate)}</div>
            <div style={{ fontSize: 13, color: "var(--label3)", marginTop: 2 }}>Day {activeDay} of {TOTAL_DAYS}</div>
          </div>
          <button className="nav-btn" onClick={() => setActiveDay(d => Math.min(todayNum, d + 1))} disabled={activeDay >= todayNum}>›</button>
        </div>
      </div>

      {/* Ticket sources */}
      <div style={{ padding: "0 16px", marginBottom: 16 }}>
        <div className="section-header">Tickets</div>
        <div className="card" style={{ opacity: isFuture ? 0.4 : 1 }}>
          {ticketSources.map(({ key, label, max, color }, idx) => (
            <div key={key} className="row" style={{ flexDirection: "column", alignItems: "flex-start", gap: 10 }}>
              <div style={{ display: "flex", width: "100%", justifyContent: "space-between", alignItems: "center" }}>
                <span style={{ fontSize: 17, fontWeight: 400, color: "var(--label)" }}>{label}</span>
                <span style={{ fontSize: 15, fontWeight: 600, color, opacity: 0.8 }}>{today[key] || 0}/{max}</span>
              </div>
              <div className="seg-bar" style={{ width: "100%" }}>
                {Array.from({ length: max }, (_, i) => (
                  <button key={i}
                    onClick={() => updateDay(key, today[key] === i + 1 ? i : i + 1)}
                    style={{ background: i < (today[key] || 0) ? color : "var(--fill3)" }}
                  />
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Entries + Visits */}
      <div style={{ padding: "0 16px", marginBottom: 16 }}>
        <div className="section-header">Daily Totals</div>
        <div className="card" style={{ opacity: isFuture ? 0.4 : 1, display: "grid", gridTemplateColumns: "1fr 1fr" }}>
          {[
            { key: "entries", label: "Entries", color: "var(--accent)" },
            { key: "visits", label: "Visits", color: "var(--accent)" },
          ].map(({ key, label, color }, i) => (
            <div key={key} style={{ padding: "14px 16px", borderRight: i === 0 ? "0.5px solid var(--sep)" : "none" }}>
              <div style={{ fontSize: 12, color: "var(--label3)", fontWeight: 500, marginBottom: 6 }}>{label}</div>
              <input
                className="num-input"
                type="number" min="0"
                value={today[key]}
                onChange={(e) => updateDay(key, e.target.value)}
                placeholder="—"
                disabled={isFuture}
                style={{ color, fontSize: 26, fontWeight: 700, width: "100%" }}
              />
            </div>
          ))}
        </div>
      </div>

      {/* Visit Recommendation */}
      <div style={{ padding: "0 16px", marginBottom: 16 }}>
        <div className="section-header">Visit Recommendation</div>
        <div className="card">
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", borderBottom: "0.5px solid var(--sep)" }}>
            {[
              { label: "Current", value: currentVisits, color: "var(--accent)" },
              { label: "Days Left", value: daysRemaining, color: "var(--label)" },
              { label: "Still Need", value: stillNeed, color: stillNeed > 0 ? "var(--red)" : "var(--accent)" },
            ].map((s, i) => (
              <div key={s.label} style={{ padding: "16px 12px", textAlign: "center", borderRight: i < 2 ? "0.5px solid var(--sep)" : "none" }}>
                <div className="stat-val" style={{ color: s.color, fontSize: 22 }}>{s.value}</div>
                <div className="stat-lbl">{s.label}</div>
              </div>
            ))}
          </div>
          <div style={{ padding: "14px 16px" }}>
            <div className="status-banner" style={{ background: onTrack ? "rgba(52,199,89,0.12)" : "rgba(255,59,48,0.1)" }}>
              <div style={{ fontSize: 28 }}>{onTrack ? "✅" : "⚠️"}</div>
              <div>
                {onTrack ? (
                  <div style={{ fontSize: 15, fontWeight: 600, color: "var(--accent)" }}>You're on track!</div>
                ) : (
                  <>
                    <div style={{ fontSize: 15, fontWeight: 700, color: "var(--red)" }}>{targetPerDay} store visits/day needed</div>
                    <div style={{ fontSize: 13, color: "var(--label3)", marginTop: 2 }}>on top of daily ad visits · {visitsNeeded} total</div>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      </div>

      {/* Entries Projection Chart */}
      <div style={{ padding: "0 16px", marginBottom: 16 }}>
        <div className="section-header">Entries Projection</div>
        <div className="card" style={{ padding: "16px" }}>
          {(() => {
            // Build data points up to activeDay only
            const points = Object.keys(log)
              .map(Number)
              .filter(d => d <= activeDay && parseInt(log[d].entries) > 0)
              .sort((a, b) => a - b)
              .map(d => ({ day: d, entries: parseInt(log[d].entries) }));

            if (points.length < 2) {
              return (
                <div style={{ textAlign: "center", padding: "32px 0", color: "var(--label3)", fontSize: 15 }}>
                  Log entries on at least 2 days to see a projection
                </div>
              );
            }

            // Calculate daily average using data up to activeDay
            const first = points[0];
            const last = points[points.length - 1];
            const dailyAvg = last.entries / last.day;
            const projectedFinal = Math.round(last.entries + dailyAvg * (TOTAL_DAYS - last.day));
            // Projection starts from last known point and goes to day 77

            // Build chart: actual points + projected line to day 77
            const chartWidth = 320;
            const chartHeight = 160;
            const padL = 48, padR = 16, padT = 12, padB = 28;
            const w = chartWidth - padL - padR;
            const h = chartHeight - padT - padB;

            const maxEntries = Math.max(projectedFinal, last.entries) * 1.05;
            const minEntries = 0;

            function xPos(day) { return padL + ((day - 1) / (TOTAL_DAYS - 1)) * w; }
            function yPos(val) { return padT + h - ((val - minEntries) / (maxEntries - minEntries)) * h; }

            // Actual path
            const actualPath = points.map((p, i) =>
              `${i === 0 ? "M" : "L"}${xPos(p.day).toFixed(1)},${yPos(p.entries).toFixed(1)}`
            ).join(" ");

            // Projection path from last actual point to day 77
            const projPath = `M${xPos(last.day).toFixed(1)},${yPos(last.entries).toFixed(1)} L${xPos(TOTAL_DAYS).toFixed(1)},${yPos(projectedFinal).toFixed(1)}`;

            // Y axis labels
            const yLabels = [0, Math.round(maxEntries * 0.5), Math.round(maxEntries)];

            // X axis labels: Jun 1, Jul 1, Aug 1, Aug 16
            const xLabels = [
              { day: 1, label: "Jun 1" },
              { day: 31, label: "Jul 1" },
              { day: 62, label: "Aug 1" },
              { day: 77, label: "Aug 16" },
            ];

            return (
              <>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}>
                  <div>
                    <div style={{ fontSize: 11, color: "var(--label3)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.05em" }}>Projected Total</div>
                    <div style={{ fontSize: 26, fontWeight: 700, color: "var(--accent)", letterSpacing: -0.5 }}>{projectedFinal.toLocaleString()}</div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 11, color: "var(--label3)", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.05em" }}>Avg/Day</div>
                    <div style={{ fontSize: 26, fontWeight: 700, color: "var(--label)", letterSpacing: -0.5 }}>{dailyAvg.toFixed(1)}</div>
                  </div>
                </div>
                <svg width="100%" viewBox={`0 0 ${chartWidth} ${chartHeight}`} style={{ overflow: "visible" }}>
                  {/* Grid lines */}
                  {yLabels.map(val => (
                    <g key={val}>
                      <line x1={padL} y1={yPos(val)} x2={padL + w} y2={yPos(val)}
                        stroke="var(--sep)" strokeWidth="0.5" />
                      <text x={padL - 6} y={yPos(val)} textAnchor="end" dominantBaseline="middle"
                        fill="var(--label3)" fontSize="9" fontFamily="-apple-system, sans-serif">
                        {val >= 1000 ? `${(val/1000).toFixed(0)}k` : val}
                      </text>
                    </g>
                  ))}
                  {/* X axis labels */}
                  {xLabels.map(({ day, label }) => (
                    <text key={day} x={xPos(day)} y={chartHeight - 4} textAnchor="middle"
                      fill="var(--label3)" fontSize="9" fontFamily="-apple-system, sans-serif">
                      {label}
                    </text>
                  ))}
                  {/* Today line */}
                  <line x1={xPos(todayNum)} y1={padT} x2={xPos(todayNum)} y2={padT + h}
                    stroke="var(--blue)" strokeWidth="1" strokeDasharray="3,3" opacity="0.5" />
                  {/* Projection line */}
                  <path d={projPath} fill="none" stroke="var(--accent)" strokeWidth="1.5"
                    strokeDasharray="5,4" opacity="0.6" />
                  {/* Actual line */}
                  <path d={actualPath} fill="none" stroke="var(--accent)" strokeWidth="2.5"
                    strokeLinecap="round" strokeLinejoin="round" />
                  {/* Dots for actual points */}
                  {points.map(p => (
                    <circle key={p.day} cx={xPos(p.day)} cy={yPos(p.entries)} r="3"
                      fill="var(--accent)" />
                  ))}
                  {/* Projected end dot */}
                  <circle cx={xPos(TOTAL_DAYS)} cy={yPos(projectedFinal)} r="3"
                    fill="none" stroke="var(--accent)" strokeWidth="1.5" />
                </svg>
              </>
            );
          })()}
        </div>
      </div>

      {/* Account + AMOE */}
      {amoeMode && (
        <div style={{ padding: "0 16px", marginBottom: 16 }}>
          <div className="section-header">Account</div>
          <div className="card">
            <div className="row" style={{ gap: 10 }}>
              <input
                type="text"
                value={accountNumber}
                onChange={(e) => setAccountNumber(e.target.value)}
                placeholder="Account number"
                style={{ flex: 1, background: "transparent", border: "none", fontSize: 17, fontFamily: "inherit", color: "var(--label)", outline: "none" }}
              />
              <button onClick={copyAccount} disabled={!accountNumber}
                className="pill-btn"
                style={{ background: accountNumber ? "var(--blue)" : "var(--fill)", color: accountNumber ? "#fff" : "var(--label3)", fontSize: 14, padding: "6px 16px" }}>
                {copyLabel}
              </button>
            </div>
            <div className="row">
              <a href="https://kwiktrip.com/game-alternate-means-of-entry" target="_blank" rel="noopener noreferrer" style={{ fontSize: 17 }}>
                Alternate Means of Entry →
              </a>
            </div>
          </div>
        </div>
      )}

      {/* Backup */}
      <div style={{ padding: "0 16px", marginBottom: 16 }}>
        <div className="section-header">Backup & Restore</div>
        <div className="card">
          <div className="row" style={{ gap: 12 }}>
            <button onClick={exportData} className="pill-btn" style={{ flex: 1, background: "var(--blue)", color: "#fff" }}>Export</button>
            <button onClick={() => importRef.current.click()} className="pill-btn" style={{ flex: 1, background: "var(--fill)", color: "var(--label)" }}>Import</button>
            <input ref={importRef} type="file" accept=".json" onChange={importData} style={{ display: "none" }} />
          </div>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
